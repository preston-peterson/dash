name: Publish container image

# Builds and pushes the dash image to GitHub Container Registry (GHCR) whenever
# a version tag (vX.Y.Z) is pushed. The image is stamped with that version so the
# in-app update check (DASH_UPDATE_REPO) lines up with the GitHub release.
on:
  push:
    tags: ["v*.*.*"]
  workflow_dispatch:

jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Lowercase image name
        id: img
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Derive version from tag
        id: ver
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      # Keep the baked-in VERSION in lockstep with the release tag.
      - name: Stamp VERSION
        run: echo "${{ steps.ver.outputs.version }}" > VERSION

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.img.outputs.name }}:latest
            ${{ steps.img.outputs.name }}:${{ steps.ver.outputs.version }}
